name: Sync Get笔记 to Notion

on:
  push:
    paths:
      - 'sync.py'
      - '.github/workflows/sync.yml'
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [sync]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync Get笔记 → Notion
        env:
          GETNOTE_API_KEY: ${{ secrets.GETNOTE_API_KEY }}
          GETNOTE_CLIENT_ID: ${{ secrets.GETNOTE_CLIENT_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          CHECK_HOURS: ${{ vars.CHECK_HOURS || '2' }}
        run: python sync.py
